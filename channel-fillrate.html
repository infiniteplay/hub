<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bikaji MT Dashboard</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
  background: #f8f9fa;
  color: #1a1a1a;
  font-size: 13px;
  padding-top: 60px;
}

header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  background: white;
  padding: 16px 24px;
  border-bottom: 1px solid #e5e7eb;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 1000;
}

body {
  padding-top: 70px; /* prevents content from hiding behind fixed header */
}

.logo {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 20px;
  font-weight: 600;
}

.hub-title {
  color: #000; /* black text for "Dashboard Hub" */
}

.header-buttons {
  display: flex;
  gap: 10px;
}

.header-buttons button {
  padding: 8px 14px;
  border: 1px solid #d1d5db;
  border-radius: 6px;
  background: #f9fafb;
  cursor: pointer;
  font-size: 14px;
  font-weight: 500;
  transition: all 0.2s ease;
}

.header-buttons button:hover {
  background: #3b82f6;
  color: white;
  border-color: #3b82f6;
}
  
/* HEADER */
header {
  position: fixed;
  top: 0; left: 0; right: 0;
  background: white;
  padding: 0 24px;
  height: 60px;
  border-bottom: 1px solid #e5e7eb;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 1000;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 16px;
  font-weight: 700;
  color: #111;
}

.logo-dot {
  width: 8px; height: 8px;
  background: #f97316;
  border-radius: 50%;
}

.header-meta {
  font-size: 12px;
  color: #6b7280;
}

/* FILTERS BAR */
.filters-bar {
  background: white;
  padding: 12px 24px;
  border-bottom: 1px solid #e5e7eb;
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
}

.filter-group {
  display: flex;
  align-items: center;
  gap: 8px;
}

.filter-label {
  font-size: 12px;
  color: #6b7280;
  font-weight: 500;
  white-space: nowrap;
}

.filter-group input[type="date"],
.filter-group select {
  height: 32px;
  padding: 0 10px;
  border: 1px solid #d1d5db;
  border-radius: 6px;
  font-size: 12px;
  background: white;
  color: #374151;
  cursor: pointer;
  outline: none;
}

.filter-group input[type="date"]:focus,
.filter-group select:focus {
  border-color: #6366f1;
  box-shadow: 0 0 0 2px rgba(99,102,241,0.1);
}

.btn-reset {
  height: 32px;
  padding: 0 14px;
  border: 1px solid #e5e7eb;
  border-radius: 6px;
  background: white;
  color: #6b7280;
  font-size: 12px;
  cursor: pointer;
  font-weight: 500;
  transition: all 0.15s;
}

.btn-reset:hover { background: #f3f4f6; color: #374151; }

.filter-divider {
  width: 1px;
  height: 20px;
  background: #e5e7eb;
}

/* MAIN */
.main {
  padding: 20px 24px;
  max-width: 1600px;
}

/* SUMMARY CARDS */
.summary-cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 12px;
  margin-bottom: 20px;
}

.card {
  background: white;
  border: 1px solid #e5e7eb;
  border-radius: 8px;
  padding: 14px 16px;
}

.card-label {
  font-size: 11px;
  color: #9ca3af;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.4px;
  margin-bottom: 6px;
}

.card-value {
  font-size: 22px;
  font-weight: 700;
  color: #111;
}

.card-sub {
  font-size: 11px;
  color: #9ca3af;
  margin-top: 2px;
}

/* TABLE */
.table-wrap {
  background: white;
  border: 1px solid #e5e7eb;
  border-radius: 8px;
  overflow: hidden;
}

.table-header-row {
  padding: 14px 20px;
  border-bottom: 1px solid #e5e7eb;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.table-title {
  font-size: 14px;
  font-weight: 600;
  color: #111;
}

.table-count {
  font-size: 12px;
  color: #9ca3af;
}

table {
  width: 100%;
  border-collapse: collapse;
}

thead th {
  background: #f9fafb;
  padding: 10px 16px;
  text-align: left;
  font-size: 11px;
  font-weight: 600;
  color: #6b7280;
  text-transform: uppercase;
  letter-spacing: 0.4px;
  border-bottom: 1px solid #e5e7eb;
  white-space: nowrap;
  position: sticky;
  top: 0;
}

thead th.num { text-align: right; }

tbody tr {
  border-bottom: 1px solid #f3f4f6;
  transition: background 0.1s;
}

tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: #f9fafb; }

tbody td {
  padding: 10px 16px;
  font-size: 13px;
  color: #374151;
  vertical-align: middle;
}

tbody td.num { text-align: right; }

/* EXPAND ROW */
.expand-row td {
  padding: 0;
  border-bottom: 1px solid #e5e7eb;
}

.expand-content {
  background: #f9fafb;
  border-top: 1px solid #e5e7eb;
}

/* TOGGLE ARROW */
.toggle-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  background: none;
  border: none;
  padding: 0;
  font-size: 13px;
  color: #374151;
  font-weight: 500;
  width: 100%;
  text-align: left;
}

.toggle-btn:hover { color: #6366f1; }

.arrow {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 18px;
  height: 18px;
  flex-shrink: 0;
  transition: transform 0.2s;
  color: #9ca3af;
}

.arrow svg { width: 12px; height: 12px; }

tr.open .arrow { transform: rotate(90deg); }

/* BADGES */
.badge {
  display: inline-flex;
  align-items: center;
  padding: 2px 8px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 400;
  white-space: nowrap;
}

.badge-processed { background: #d1fae5; color: #065f46; }
.badge-open      { background: #dbeafe; color: #1e40af; }
.badge-updated   { background: #fef3c7; color: #92400e; }
.badge-closed    { background: #f3f4f6; color: #6b7280; }
.badge-unmapped  { background: #fee2e2; color: #991b1b; }

/* FILL RATE BAR */
.fill-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
  justify-content: flex-end;
}

.fill-bar-bg {
  width: 60px;
  height: 4px;
  background: #e5e7eb;
  border-radius: 2px;
  overflow: hidden;
}

.fill-bar-fg {
  height: 100%;
  border-radius: 2px;
  background: #10b981;
  transition: width 0.3s;
}

.fill-bar-fg.mid { background: #f59e0b; }
.fill-bar-fg.low { background: #ef4444; }

.fill-pct {
  font-size: 12px;
  font-weight: 600;
  min-width: 38px;
  text-align: right;
}

/* NESTED TABLE (states / POs / SKUs) */
.nested-table-wrap {
  padding: 0;
}

.nested-table-wrap table thead th {
  background: #eff6ff;
  font-size: 10.5px;
}

.nested-table-wrap.level2 table thead th {
  background: #f0fdf4;
}

.nested-table-wrap.level3 table thead th {
  background: #fff7ed;
}

.level-indent-1 { padding-left: 32px !important; }
.level-indent-2 { padding-left: 48px !important; }
.level-indent-3 { padding-left: 64px !important; }

/* CHAIN ROW */
.chain-row td:first-child {
  padding-left: 16px;
}

.chain-name {
  font-weight: 600;
  font-size: 13px;
}

/* NO DATA */
.no-data {
  text-align: center;
  padding: 40px;
  color: #9ca3af;
  font-size: 13px;
}

</style>
</head>
<body>

<header>
  <div class="logo">
    <img src="finifi-logo.png" alt="Finifi Logo" style="height: 24px;">
    <span class="hub-title">Channel & Region Fill Rate</span>
  </div>
  <div class="header-meta" id="headerMeta">Loading data...</div>
  <div class="header-buttons">
    <button onclick="window.location.href='index.html'">Go Back</button>
    <button onclick="location.reload()">Refresh</button>
    <button onclick="exportDashboard()">Export</button>
  </div>
</header>

<div class="filters-bar">
  <div class="filter-group">
    <span class="filter-label">PO Date From</span>
    <input type="date" id="dateFrom" onchange="applyFilters()">
  </div>
  <div class="filter-group">
    <span class="filter-label">To</span>
    <input type="date" id="dateTo" onchange="applyFilters()">
  </div>
  <div class="filter-divider"></div>
  <div class="filter-group">
    <span class="filter-label">PO Status</span>
    <select id="statusFilter" onchange="applyFilters()">
      <option value="">All Statuses</option>
      <option value="Open">Open</option>
      <option value="Processed">Processed</option>
      <option value="Updated">Updated</option>
      <option value="Closed">Closed</option>
      <option value="Unmapped">Unmapped</option>
    </select>
  </div>
  <div class="filter-divider"></div>
  <div class="filter-group">
    <span class="filter-label">Channel</span>
    <select id="chainFilter" onchange="applyFilters()">
      <option value="">All Channels</option>
      <option value="RRL">RRL (Reliance)</option>
      <option value="D-MART">D-MART</option>
      <option value="METRO">METRO</option>
    </select>
  </div>
  <button class="btn-reset" onclick="resetFilters()">Reset</button>
  <div class="filter-divider"></div>
  <span class="filter-label" id="filteredCount" style="color:#6366f1;font-weight:600;"></span>
</div>

<div class="main">
  <!-- Summary Cards -->
  <div class="summary-cards" id="summaryCards"></div>

  <!-- Main Drill-down Table -->
  <div class="table-wrap">
    <div class="table-header-row">
      <div class="table-title">Channel → State → PO → SKU</div>
      <div class="table-count" id="tableCount"></div>
    </div>
    <table id="mainTable">
      <thead>
        <tr>
          <th style="width:280px">Channel / State / PO / SKU</th>
          <th class="num">PO Qty (Cases)</th>
          <th class="num">Inv Qty (Cases)</th>
          <th class="num">Fill Rate</th>
          <th>Status</th>
          <th>City</th>
          <th>PO Date</th>
          <th>PO Expiry</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
    <div class="no-data" id="noData" style="display:none">No POs match the current filters.</div>
  </div>
</div>

}

function arrow() {
  return `<span class="arrow"><svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4,2 8,6 4,10"/></svg></span>`;
}

function getFilteredData() {
  const result = {};
  for (const chain in RAW_DATA) {
    if (filters.chain && chain !== filters.chain) continue;
    result[chain] = {};
    for (const state in RAW_DATA[chain]) {
      result[chain][state] = {};
      for (const poNum in RAW_DATA[chain][state]) {
        const po = RAW_DATA[chain][state][poNum];
        // Status filter
        if (filters.status && po.po_status !== filters.status) continue;
        // Date filter (input returns YYYY-MM-DD, po_date is DD-MM-YYYY)
        if (filters.dateFrom || filters.dateTo) {
          const d = parseDate(po.po_date);
          if (d) {
            if (filters.dateFrom) {
              const fp = filters.dateFrom.split('-');
              const fromD = new Date(parseInt(fp[0]), parseInt(fp[1])-1, parseInt(fp[2]));
              if (d < fromD) continue;
            }
            if (filters.dateTo) {
              const tp = filters.dateTo.split('-');
              const toD = new Date(parseInt(tp[0]), parseInt(tp[1])-1, parseInt(tp[2]));
              if (d > toD) continue;
            }
          }
        }
        result[chain][state][poNum] = po;
      }
      if (Object.keys(result[chain][state]).length === 0) delete result[chain][state];
    }
    if (Object.keys(result[chain]).length === 0) delete result[chain];
  }
  return result;
}

function applyFilters() {
  filters.dateFrom = document.getElementById('dateFrom').value;
  filters.dateTo = document.getElementById('dateTo').value;
  filters.status = document.getElementById('statusFilter').value;
  filters.chain = document.getElementById('chainFilter').value;
  render();
}

function resetFilters() {
  document.getElementById('dateFrom').value = '';
  document.getElementById('dateTo').value = '';
  document.getElementById('statusFilter').value = '';
  document.getElementById('chainFilter').value = '';
  filters = { dateFrom: '', dateTo: '', status: '', chain: '' };
  render();
}

function toggleChain(chain) {
  if (expandedChains.has(chain)) expandedChains.delete(chain);
  else expandedChains.add(chain);
  render();
}

function toggleState(chain, state) {
  const key = chain + '|' + state;
  if (expandedStates.has(key)) expandedStates.delete(key);
  else expandedStates.add(key);
  render();
}

function togglePO(chain, state, poNum) {
  const key = chain + '|' + state + '|' + poNum;
  if (expandedPOs.has(key)) expandedPOs.delete(key);
  else expandedPOs.add(key);
  render();
}

function render() {
  const data = getFilteredData();
  const tbody = document.getElementById('tableBody');
  let html = '';
  let totalPOs = 0;
  let totalPOQty = 0, totalInvQty = 0;

  for (const chain in data) {
    // Compute chain-level totals from filtered data
    let chainPOQty = 0, chainInvQty = 0, chainPOs = 0;
    for (const state in data[chain]) {
      for (const po in data[chain][state]) {
        chainPOQty += data[chain][state][po].total_po_qty;
        chainInvQty += data[chain][state][po].total_inv_qty;
        chainPOs++;
      }
    }
    totalPOs += chainPOs;
    totalPOQty += chainPOQty;
    totalInvQty += chainInvQty;
    const chainFill = chainPOQty > 0 ? (chainInvQty/chainPOQty*100).toFixed(1) : '--';
    const isChainOpen = expandedChains.has(chain);

    // Compute avg TAT for chain (only numeric, non-'--' values)
    let chainTatVals = [];
    for (const state in data[chain]) {
      for (const pn in data[chain][state]) {
        const po = data[chain][state][pn];
        for (const sku of po.skus) {
          if (typeof sku.tat === 'number') chainTatVals.push(sku.tat);
        }
      }
    }
    const chainAvgTat = chainTatVals.length > 0 ? (chainTatVals.reduce((a,b)=>a+b,0)/chainTatVals.length).toFixed(1) : '--';

    html += `<tr class="chain-row ${isChainOpen ? 'open' : ''}" onclick="toggleChain('${chain}')">
      <td><button class="toggle-btn"><span class="chain-name">${arrow()}${chain}</span></button></td>
      <td class="num">${chainPOQty.toLocaleString()}</td>
      <td class="num">${chainInvQty.toLocaleString()}</td>
      <td class="num">${fillBar(chainFill)}</td>
      <td><span style="font-size:11px;color:#9ca3af">${chainPOs} POs · ${Object.keys(data[chain]).length} States</span></td>
      <td style="font-size:12px;color:#6b7280;text-align:right">${chainAvgTat !== '--' ? chainAvgTat + ' days avg' : '--'}</td>
      <td></td><td></td>
    </tr>`;

    if (isChainOpen) {
      for (const state in data[chain]) {
        const stateKey = chain + '|' + state;
        let statePOQty = 0, stateInvQty = 0;
        const statePOs = Object.values(data[chain][state]);
        statePOs.forEach(p => { statePOQty += p.total_po_qty; stateInvQty += p.total_inv_qty; });
        const stateFill = statePOQty > 0 ? (stateInvQty/statePOQty*100).toFixed(1) : '--';
        const isStateOpen = expandedStates.has(stateKey);

        html += `<tr class="${isStateOpen ? 'open' : ''}" onclick="toggleState('${chain}', '${state}')">
          <td class="level-indent-1"><button class="toggle-btn">${arrow()}${state}</button></td>
          <td class="num">${statePOQty.toLocaleString()}</td>
          <td class="num">${stateInvQty.toLocaleString()}</td>
          <td class="num">${fillBar(stateFill)}</td>
          <td><span style="font-size:11px;color:#9ca3af">${statePOs.length} POs</span></td>
          <td></td><td></td><td></td>
        </tr>`;

        if (isStateOpen) {
          // Sort POs by date desc
          const sortedPOs = Object.values(data[chain][state]).sort((a,b) => {
            const da = parseDate(a.po_date), db = parseDate(b.po_date);
            if (da && db) return db - da;
            return 0;
          });

          for (const po of sortedPOs) {
            const poKey = chain + '|' + state + '|' + po.po_num;
            const isPOOpen = expandedPOs.has(poKey);
            const poEsc = po.po_num.replace(/'/g, "\'");

            html += `<tr class="${isPOOpen ? 'open' : ''}" onclick="togglePO('${chain}', '${state}', '${poEsc}')">
              <td class="level-indent-2"><button class="toggle-btn">${arrow()}PO ${po.po_num}</button></td>
              <td class="num">${po.total_po_qty.toLocaleString()}</td>
              <td class="num">${po.total_inv_qty.toLocaleString()}</td>
              <td class="num">${fillBar(po.avg_fill_rate)}</td>
              <td><span class="badge ${getStatusBadgeClass(po.po_status)}">${po.po_status}</span></td>
              <td style="color:#6b7280;font-size:12px">${po.city}</td>
              <td style="color:#6b7280;font-size:12px">${po.po_date}</td>
              <td style="color:#6b7280;font-size:12px">${po.po_expiry}</td>
            </tr>`;

            if (isPOOpen) {
              // SKU rows
              html += `<tr><td colspan="8" style="padding:0;background:#fffbf5;">
                <div style="border-top:1px solid #fed7aa">
                <table style="width:100%">
                <thead><tr>
                  <th style="width:280px;background:#fff7ed;padding:8px 16px 8px 64px;font-size:10.5px;color:#9a3412">SKU</th>
                  <th style="background:#fff7ed;padding:8px 16px;font-size:10.5px;color:#9a3412;text-align:right">Category</th>
                  <th style="background:#fff7ed;padding:8px 16px;font-size:10.5px;color:#9a3412;text-align:right">PO Qty</th>
                  <th style="background:#fff7ed;padding:8px 16px;font-size:10.5px;color:#9a3412;text-align:right">Inv Qty</th>
                  <th style="background:#fff7ed;padding:8px 16px;font-size:10.5px;color:#9a3412;text-align:right">Fill Rate</th>
                  <th style="background:#fff7ed;padding:8px 16px;font-size:10.5px;color:#9a3412" colspan="3"></th>
                </tr></thead>
                <tbody>`;

              for (const sku of po.skus) {
                const skuFill = (typeof sku.fill_rate === 'number') ? sku.fill_rate.toFixed(1)+'%' : '--';
                const skuTat = (typeof sku.tat === 'number') ? sku.tat : '--';
                html += `<tr style="border-bottom:1px solid #fef3c7">
                  <td style="padding:7px 16px 7px 64px;font-size:12px;color:#374151">${sku.sku}</td>
                  <td style="padding:7px 16px;font-size:11px;color:#9ca3af;text-align:right">${sku.category}</td>
                  <td style="padding:7px 16px;text-align:right;font-size:12px">${sku.po_qty}</td>
                  <td style="padding:7px 16px;text-align:right;font-size:12px">${sku.inv_qty}</td>
                  <td style="padding:7px 16px;text-align:right;font-size:12px;font-weight:600;color:${typeof sku.fill_rate==='number'?(sku.fill_rate>=70?'#10b981':(sku.fill_rate>=40?'#f59e0b':'#ef4444')):'#9ca3af'}">${skuFill}</td>
                  <td colspan="3"></td>
                </tr>`;
              }

              html += `</tbody></table></div></td></tr>`;
            }
          }
        }
      }
    }
  }

  tbody.innerHTML = html || '';
  document.getElementById('noData').style.display = html ? 'none' : 'block';

  // Update summary cards
  const totalFill = totalPOQty > 0 ? (totalInvQty/totalPOQty*100).toFixed(1) : '--';
  const chainsCount = Object.keys(data).length;
  document.getElementById('summaryCards').innerHTML = `
    <div class="card"><div class="card-label">Channels</div><div class="card-value">${chainsCount}</div><div class="card-sub">Active channels</div></div>
    <div class="card"><div class="card-label">Total POs</div><div class="card-value">${totalPOs.toLocaleString()}</div><div class="card-sub">Matching filters</div></div>
    <div class="card"><div class="card-label">PO Qty (Cases)</div><div class="card-value">${totalPOQty.toLocaleString()}</div><div class="card-sub">Total ordered</div></div>
    <div class="card"><div class="card-label">Inv Qty (Cases)</div><div class="card-value">${totalInvQty.toLocaleString()}</div><div class="card-sub">Total invoiced</div></div>
    <div class="card"><div class="card-label">Overall Fill Rate</div><div class="card-value" style="color:${parseFloat(totalFill)>=70?'#10b981':(parseFloat(totalFill)>=40?'#f59e0b':'#ef4444')}">${totalFill}%</div><div class="card-sub">Cases basis</div></div>
  `;

  document.getElementById('headerMeta').textContent = `${totalPOs} POs · ${chainsCount} Channels`;
  document.getElementById('tableCount').textContent = `${totalPOs} purchase orders`;

  const fc = filters.status || filters.chain || filters.dateFrom || filters.dateTo;
  document.getElementById('filteredCount').textContent = fc ? `Filtered view` : '';
}

// Init
render();
</script>
</body>
</html>
